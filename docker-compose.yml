version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: fempy_postgres
    environment:
      POSTGRES_USER: fempy
      POSTGRES_PASSWORD: fempy_pw
      POSTGRES_DB: fempy_db
    ports:
      - "5432:5432"
    volumes:
      - fempy_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fempy_redis
    ports:
      - "6379:6379"

volumes:
  fempy_pgdata: